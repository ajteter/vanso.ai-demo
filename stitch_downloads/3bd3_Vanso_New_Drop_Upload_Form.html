<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vanso Creator Studio - New Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3713ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131022",
                        "surface-dark": "#1d1c27",
                        "border-dark": "#3f3b54",
                        "text-secondary": "#a19db9"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased overflow-hidden">
<div class="flex h-screen w-full overflow-hidden">
<aside class="w-[260px] h-full flex-shrink-0 bg-[#121118] border-r border-border-dark flex flex-col justify-between p-4 overflow-y-auto z-20">
<div class="flex flex-col gap-6">
<div class="flex flex-col px-2">
<h1 class="text-white text-xl font-bold leading-normal tracking-tight">Vanso</h1>
<p class="text-text-secondary text-xs font-normal leading-normal">Creator Studio</p>
</div>
<nav class="flex flex-col gap-2">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-dark hover:text-white transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:text-white transition-colors">dashboard</span>
<p class="text-sm font-medium leading-normal">Dashboard</p>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/20 text-white border-l-2 border-primary" href="#">
<span class="material-symbols-outlined text-[24px] fill-1">music_note</span>
<p class="text-sm font-medium leading-normal">My Drops</p>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-dark hover:text-white transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:text-white transition-colors">bar_chart</span>
<p class="text-sm font-medium leading-normal">Analytics</p>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-dark hover:text-white transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:text-white transition-colors">attach_money</span>
<p class="text-sm font-medium leading-normal">Earnings</p>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-dark hover:text-white transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:text-white transition-colors">settings</span>
<p class="text-sm font-medium leading-normal">Settings</p>
</a>
</nav>
</div>
<div class="flex items-center gap-3 px-3 py-4 mt-auto border-t border-border-dark">
<div class="h-10 w-10 rounded-full bg-gradient-to-tr from-primary to-purple-500 flex items-center justify-center text-white font-bold text-sm">
                JD
            </div>
<div class="flex flex-col">
<p class="text-white text-sm font-medium">John Doe</p>
<p class="text-text-secondary text-xs">Pro Account</p>
</div>
</div>
</aside>
<main class="flex-1 h-full overflow-y-auto bg-background-light dark:bg-background-dark relative">
<div class="max-w-[1000px] mx-auto px-8 py-10 pb-24">
<header class="flex flex-col gap-2 mb-10 relative">
<div class="flex items-start justify-between">
<div>
<h2 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">New Drop</h2>
<p class="text-slate-500 dark:text-text-secondary text-base mt-2">Upload your latest track and manage metadata.</p>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-200 dark:bg-surface-dark hover:bg-slate-300 dark:hover:bg-border-dark text-slate-600 dark:text-text-secondary hover:text-slate-900 dark:hover:text-white transition-all focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
</header>
<section class="mb-8">
<div class="group relative flex flex-col items-center justify-center w-full h-24 border border-green-500/30 rounded-xl bg-green-500/10 transition-all cursor-default">
<div class="flex items-center justify-between w-full px-6">
<div class="flex items-center gap-4">
<div class="h-12 w-12 rounded-full bg-green-500 flex items-center justify-center text-white shadow-lg shadow-green-500/20">
<span class="material-symbols-outlined text-2xl">check</span>
</div>
<div class="flex flex-col">
<p class="text-base font-semibold text-slate-900 dark:text-white">midnight_city_final.wav</p>
<p class="text-xs text-green-600 dark:text-green-400 font-medium">Upload Complete • 45.2 MB</p>
</div>
</div>
<button class="text-slate-500 hover:text-red-500 transition-colors" type="button">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
</section>
<form class="flex flex-col gap-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-gray-300" for="track-title">Title</label>
<input class="w-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-lg px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-text-secondary focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="track-title" placeholder="e.g. Midnight City" type="text" value="Midnight City"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-gray-300" for="track-lang">Language</label>
<div class="relative">
<select class="w-full appearance-none bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-lg px-4 py-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none pr-10" id="track-lang">
<option selected="">English</option>
<option>Spanish</option>
<option>French</option>
<option>Instrumental</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-[200px_1fr] gap-8">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-gray-300">Cover Art</label>
<div class="w-[200px] h-[200px] relative rounded-lg border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark overflow-hidden group cursor-pointer hover:border-primary transition-colors">
<img alt="Synthwave cover art" class="absolute inset-0 w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZ_nUoHn-8gffReRSHmGwPjdmW5ZMv-MaNljVOl9kUP8tHs56pXsV5nTfwa1Ce6YP-z3BVZfA2GlqVJr6IO1OFPUamgxSb8wV8J3VeC3hJ0Riig6gGDoOh2pu3xDtGd3jDuEdzs7VnI0bxUxF1mEAGhnQGfdV7An2A07SVIQyxzYOxKYdr00Iu1ThgJLGfd0yH89y0E1kW1ZJga2MGEsQA1xq0DytKxlXjHMuPTxcr7xVAsOn0TgwWQWYblTnW0eLTLgZQMEebjlY"/>
<div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl">edit</span>
</div>
</div>
</div>
<div class="flex flex-col gap-6">
<div class="flex flex-col gap-2 h-full">
<label class="text-sm font-medium text-slate-700 dark:text-gray-300" for="track-desc">Description</label>
<textarea class="w-full h-full min-h-[200px] bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-lg px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-text-secondary focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none resize-none" id="track-desc" placeholder="Tell your fans about this track..." rows="4">A high-energy electronic track inspired by city lights and late night drives.</textarea>
</div>
</div>
</div>
<div class="flex flex-col gap-2 relative">
<div class="flex items-center justify-between">
<label class="text-sm font-medium text-slate-700 dark:text-gray-300" for="track-lyrics">Lyrics</label>
<button class="text-xs font-semibold text-primary hover:text-primary/80 flex items-center gap-1 transition-colors px-2 py-1 rounded hover:bg-primary/10" type="button">
<span class="material-symbols-outlined text-[16px]">upload_file</span>
                            Upload .txt / .lrc
                        </button>
</div>
<textarea class="w-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-lg px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-text-secondary focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-mono text-sm leading-relaxed" id="track-lyrics" placeholder="Paste lyrics here..." rows="6">Waiting in a car
Waiting for a ride in the dark
The night city grows
Look and see her eyes, they glow</textarea>
</div>
</form>
<div class="mt-12 flex items-center justify-end gap-4 pt-6 border-t border-slate-200 dark:border-border-dark">
<button class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-600 dark:text-text-secondary hover:text-slate-900 dark:hover:text-white transition-colors">
                    Save Draft
                </button>
<button class="px-8 py-2.5 rounded-lg bg-primary hover:bg-primary/90 text-white text-sm font-bold shadow-lg shadow-primary/20 transition-all transform active:scale-95 flex items-center gap-2">
<span>Post Drop</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
</main>
</div>
</body></html>
