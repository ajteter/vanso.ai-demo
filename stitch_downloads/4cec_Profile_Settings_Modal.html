<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vanso Creator Studio - Profile Settings</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3713ec",
                        "primary-hover": "#2c0fb8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131022",
                        "surface-dark": "#1d1c2a",
                        "surface-border": "#3f3b54",
                        "text-secondary": "#a19db9",
                        "danger": "#ef4444",
                        "danger-hover": "#dc2626",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for dark theme feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #131022; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3f3b54; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a5575; 
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex items-center justify-center p-4">
<!-- Dashboard Background Simulation (Blurred Content) -->
<div aria-hidden="true" class="fixed inset-0 z-0 overflow-hidden pointer-events-none select-none opacity-40 blur-sm">
<!-- Sidebar placeholder -->
<div class="absolute left-0 top-0 bottom-0 w-64 bg-surface-dark border-r border-surface-border hidden md:flex flex-col p-4 gap-4">
<div class="h-8 w-32 bg-surface-border rounded opacity-50 mb-8"></div>
<div class="h-6 w-full bg-surface-border rounded opacity-30"></div>
<div class="h-6 w-full bg-surface-border rounded opacity-30"></div>
<div class="h-6 w-full bg-surface-border rounded opacity-30"></div>
</div>
<!-- Main content placeholder -->
<div class="absolute left-0 md:left-64 right-0 top-0 h-16 border-b border-surface-border flex items-center px-8 justify-between bg-background-dark">
<div class="h-6 w-48 bg-surface-border rounded opacity-40"></div>
<div class="size-8 rounded-full bg-surface-border opacity-40"></div>
</div>
<!-- Dashboard cards placeholder -->
<div class="absolute left-0 md:left-64 right-0 top-16 bottom-0 p-8 grid grid-cols-3 gap-6">
<div class="h-48 rounded-xl bg-surface-dark border border-surface-border"></div>
<div class="h-48 rounded-xl bg-surface-dark border border-surface-border"></div>
<div class="h-48 rounded-xl bg-surface-dark border border-surface-border"></div>
<div class="col-span-2 h-64 rounded-xl bg-surface-dark border border-surface-border"></div>
<div class="h-64 rounded-xl bg-surface-dark border border-surface-border"></div>
</div>
</div>
<!-- Backdrop Overlay -->
<div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-10 transition-opacity"></div>
<!-- Modal Container -->
<div class="relative z-20 w-full max-w-[560px] flex flex-col rounded-xl border border-surface-border bg-[#181621] shadow-2xl shadow-black/50 overflow-hidden transform transition-all">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-surface-border bg-[#1d1c2a]/50">
<h2 class="text-xl font-bold text-white tracking-tight">Edit Profile</h2>
<button class="group p-2 rounded-lg hover:bg-white/10 text-text-secondary hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl leading-none">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto max-h-[calc(100vh-160px)] custom-scrollbar">
<div class="p-6 md:p-8 flex flex-col gap-8">
<!-- Avatar Section -->
<div class="flex flex-col items-center justify-center gap-3">
<div class="relative group cursor-pointer">
<div class="size-24 rounded-full overflow-hidden border-4 border-surface-border bg-surface-dark relative">
<img alt="Profile avatar of a woman looking at camera" class="w-full h-full object-cover transition-opacity group-hover:opacity-75" data-alt="User profile avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCu4rIU0rFLCssWKWEiKaqF03qhw4GNsdxBCDzIymhoEC1SBychtw7tWfRJ0Xy6i8GO8tRWjiGrJRs5yGPmZG4d69qUrosxr-6_NfxQYQyTDGegcuFbJtdrbQ8JTPm_WSwEeBz2-h8mvcCEbpYRRmEJqJPLMP8lY2PRkUYmCpxUAdwHZQndPVfUEXtHZDdheTsfF0OmchI5sy4pSXlAFWAF5wa-OZPLS1AKZ6qvnBKWK2k33OyvaGaTVgBVwd4rCd0XsdTmDeBFSbs"/>
<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/30">
<span class="material-symbols-outlined text-white text-3xl">camera_alt</span>
</div>
</div>
<div class="absolute bottom-0 right-0 p-1.5 bg-primary rounded-full border-2 border-[#181621] text-white flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-sm leading-none">edit</span>
</div>
</div>
<button class="text-primary hover:text-primary-hover text-sm font-medium transition-colors hover:underline underline-offset-4">
                        Change Photo
                    </button>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5">
<!-- Username -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-white/90" for="username">Username</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-text-secondary select-none">@</span>
<input class="w-full h-11 pl-8 pr-4 bg-surface-dark border border-surface-border rounded-lg text-white placeholder-text-secondary focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none transition-all text-sm" id="username" placeholder="Enter username" type="text" value="vanso_creator"/>
</div>
<p class="text-xs text-text-secondary text-right">Max 30 characters</p>
</div>
<!-- Description -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-white/90" for="description">Description</label>
<textarea class="w-full p-3 bg-surface-dark border border-surface-border rounded-lg text-white placeholder-text-secondary focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none transition-all text-sm resize-none" id="description" placeholder="Tell us a little about yourself..." rows="4">Digital artist creating 3D assets for VR environments.</textarea>
<p class="text-xs text-text-secondary text-right">Max 150 characters</p>
</div>
<!-- Country/Region -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-white/90" for="country">Country/Region</label>
<div class="relative">
<select class="w-full h-11 pl-3 pr-10 bg-surface-dark border border-surface-border rounded-lg text-white appearance-none focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none transition-all text-sm cursor-pointer" id="country">
<option value="us">United States</option>
<option value="ca">Canada</option>
<option value="uk">United Kingdom</option>
<option value="au">Australia</option>
<option value="jp">Japan</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary flex items-center">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Divider -->
<hr class="border-surface-border/50"/>
<!-- Danger Zone -->
<div class="flex flex-col gap-3">
<div class="flex items-center gap-2 text-danger/90">
<span class="material-symbols-outlined text-xl">warning</span>
<h3 class="text-sm font-bold uppercase tracking-wide">Danger Zone</h3>
</div>
<div class="rounded-lg border border-red-900/30 bg-red-900/10 p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
<div class="flex flex-col">
<span class="text-sm font-medium text-white/90">Delete Account</span>
<span class="text-xs text-text-secondary">This action cannot be undone.</span>
</div>
<button class="px-4 py-2 bg-transparent border border-danger/40 hover:bg-danger/10 text-danger text-sm font-medium rounded-lg transition-colors whitespace-nowrap">
                            Delete Account
                        </button>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-6 py-5 border-t border-surface-border bg-[#1d1c2a]/50 flex justify-end gap-3">
<button class="px-5 py-2.5 rounded-lg text-sm font-medium text-white hover:bg-white/5 transition-colors">
                Cancel
            </button>
<button class="px-6 py-2.5 rounded-lg bg-primary hover:bg-primary-hover text-white text-sm font-medium shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Save Changes
            </button>
</div>
</div>
</body></html>
