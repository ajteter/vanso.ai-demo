<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Song Details - Vanso Creator Studio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3713ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2b2839;
            border-radius: 10px;
        }
        .drawer-blur {
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-white overflow-hidden">
<!-- Dashboard Background Simulation -->
<div class="fixed inset-0 flex">
<!-- Sidebar Placeholder -->
<aside class="w-64 border-r border-[#2b2839] bg-[#121118] flex flex-col p-4">
<div class="flex items-center gap-3 mb-8">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white">music_note</span>
</div>
<h1 class="text-lg font-bold">Vanso Creator</h1>
</div>
<nav class="space-y-2">
<div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-[#2b2839]">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-sm font-medium">Dashboard</span>
</div>
<div class="flex items-center gap-3 px-3 py-2 text-[#a19db9]">
<span class="material-symbols-outlined">library_music</span>
<span class="text-sm font-medium">Library</span>
</div>
<div class="flex items-center gap-3 px-3 py-2 text-[#a19db9]">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-sm font-medium">Analytics</span>
</div>
</nav>
</aside>
<!-- Main Content Placeholder -->
<main class="flex-1 bg-background-dark p-8">
<header class="flex justify-between items-center mb-8">
<h2 class="text-2xl font-bold">Project: Summer Vibes</h2>
<div class="flex gap-4">
<button class="bg-[#2b2839] p-2 rounded-lg"><span class="material-symbols-outlined">notifications</span></button>
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</div>
</header>
<div class="grid grid-cols-3 gap-6 opacity-50">
<div class="aspect-video bg-[#2b2839] rounded-xl"></div>
<div class="aspect-video bg-[#2b2839] rounded-xl"></div>
<div class="aspect-video bg-[#2b2839] rounded-xl"></div>
</div>
</main>
</div>
<!-- Edit Song Details Drawer Overlay -->
<div class="fixed inset-0 z-50 flex justify-end">
<!-- Backdrop -->
<div class="absolute inset-0 bg-black/60 drawer-blur"></div>
<!-- Drawer Content -->
<div class="relative w-full max-w-[560px] h-full bg-[#121118] border-l border-[#2b2839] flex flex-col shadow-2xl">
<!-- Sticky Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-[#2b2839] bg-[#121118]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#a19db9]">edit</span>
<h2 class="text-lg font-bold tracking-tight">Edit Details</h2>
</div>
<button class="size-10 flex items-center justify-center rounded-lg hover:bg-[#2b2839] transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Body -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-6">
<div class="space-y-8">
<!-- Cover Art Section -->
<div class="flex flex-col items-center gap-4">
<div class="relative group">
<div class="w-40 h-40 bg-[#2b2839] rounded-lg overflow-hidden shadow-lg border border-[#3d3a4d] bg-cover bg-center" data-alt="Abstract musical album cover art with geometric shapes" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCR1UZPC4krlw6z492kIm5_bwwNlghiG-YCiXexYo4Kgk60ObGCu3Dp_LZVizNfx_18hPvVkEEWwZNM3iP74NhM5pOLO9QWq62GrlNEBakgXKzvMfenuh2xMJwNgJel6M0nVkwFNqHGjnZD5Qh62sV8Kds9MVUaiFdHb5a30m5Pkj-BxaQmXTr6z-UwfGVw76ylQzb2SASbSiFuHMaGFi_6rNQoAtlrbSq8ahqNrdBP7wCmfKUxr0wqXGEZNSF-h3eNBEt9BtE-0oA')">
</div>
<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-lg cursor-pointer">
<span class="material-symbols-outlined">photo_camera</span>
</div>
</div>
<button class="text-primary text-sm font-semibold hover:underline decoration-2 underline-offset-4">
                            Change Image
                        </button>
</div>
<!-- File Info (Read-only) -->
<div class="bg-[#1e1c29] border border-[#2b2839] rounded-lg p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 bg-white/5 rounded flex items-center justify-center">
<span class="material-symbols-outlined text-[#a19db9]">audio_file</span>
</div>
<div>
<p class="text-xs text-[#a19db9] font-medium uppercase tracking-wider">Audio Filename</p>
<p class="text-sm font-medium text-white/90">song_final.mp3</p>
</div>
</div>
<span class="material-symbols-outlined text-[#5a5770] text-xl" title="Source file cannot be changed here">lock</span>
</div>
<!-- Form Stack -->
<div class="space-y-6">
<!-- Title -->
<div class="space-y-2">
<label class="text-sm font-medium text-[#a19db9]">Title</label>
<input class="w-full bg-[#1e1c29] border-[#2b2839] rounded-lg text-white focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-[#5a5770]" placeholder="Enter song title" type="text" value="Summer Vibes (Remix)"/>
</div>
<!-- Language -->
<div class="space-y-2">
<label class="text-sm font-medium text-[#a19db9]">Language</label>
<div class="relative">
<select class="w-full bg-[#1e1c29] border-[#2b2839] rounded-lg text-white focus:border-primary focus:ring-1 focus:ring-primary appearance-none py-2.5">
<option value="en">English</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-[#a19db9]">expand_more</span>
</div>
</div>
<!-- Lyrics -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-[#a19db9]">Lyrics</label>
<button class="text-xs font-bold text-primary flex items-center gap-1 hover:bg-primary/10 px-2 py-1 rounded transition-colors">
<span class="material-symbols-outlined text-sm">upload</span>
                                    Upload .txt/.lrc
                                </button>
</div>
<textarea class="w-full bg-[#1e1c29] border-[#2b2839] rounded-lg text-white focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-[#5a5770] resize-none text-sm leading-relaxed" placeholder="Enter or paste lyrics here..." rows="4"></textarea>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="text-sm font-medium text-[#a19db9]">Description</label>
<textarea class="w-full bg-[#1e1c29] border-[#2b2839] rounded-lg text-white focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-[#5a5770] resize-none text-sm leading-relaxed" placeholder="Tell your audience about this track" rows="3"></textarea>
</div>
</div>
</div>
</div>
<!-- Sticky Footer -->
<div class="px-6 py-6 border-t border-[#2b2839] bg-[#121118] flex items-center gap-4">
<button class="flex-1 px-4 py-2.5 rounded-lg border border-[#2b2839] text-white font-semibold text-sm hover:bg-[#2b2839] transition-colors">
                    Cancel
                </button>
<button class="flex-[2] px-4 py-2.5 rounded-lg bg-primary text-white font-bold text-sm hover:brightness-110 transition-all shadow-[0_0_20px_rgba(55,19,236,0.3)]">
                    Save Changes
                </button>
</div>
</div>
</div>
</body></html>
