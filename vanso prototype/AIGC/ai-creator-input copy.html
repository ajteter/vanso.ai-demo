<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanso Creator Input Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'vanso-magenta': '#F5328A',
                        'vanso-cyan': '#54E3D5',
                        'vanso-peach': '#ECA08B',
                        'vanso-bg': '#000000',
                        'vanso-border': 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f5f5f5;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-frame {
            width: 100%;
            max-width: 430px;
            height: 932px;
            background-color: #000;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border: 12px solid #1a1a1a;
            border-radius: 54px;
            display: flex;
            flex-direction: column;
        }

        .phone-frame::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .cta-gradient {
            background: linear-gradient(134deg, #F5328A 19.26%, #ECA08B 57.57%, #54E3D5 91.14%);
        }

        .footer-sticky {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            padding-bottom: 48px;
            background: linear-gradient(to top, #000 85%, transparent);
            z-index: 100;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 140px;
        }

        .content-scroll::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="font-sans">

    <div class="phone-frame relative bg-black overflow-hidden z-0">
        <!-- Static Subtle Auras -->
        <div
            class="absolute top-[-50px] left-[-50px] w-[350px] h-[350px] bg-vanso-magenta mix-blend-screen blur-[140px] opacity-[0.20] pointer-events-none -z-10">
        </div>
        <div
            class="absolute bottom-[-50px] right-[-50px] w-[350px] h-[350px] bg-vanso-cyan mix-blend-screen blur-[140px] opacity-[0.18] pointer-events-none -z-10">
        </div>

        <header class="flex items-center px-6 pt-14 pb-5 sticky top-0 z-50 bg-black/60 backdrop-blur-xl relative">
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-vanso-border absolute left-6">
                <i data-lucide="x" class="w-5 h-5 text-zinc-400"></i>
            </button>
            <h1 class="text-xl font-bold tracking-tight text-white w-full text-center">New Drop</h1>
        </header>

        <div class="content-scroll hide-scrollbar">
            <main class="px-6 space-y-6 pt-2">
                <button
                    class="w-full flex items-center justify-center gap-3 py-3.5 rounded-2xl bg-transparent border border-white/10 text-zinc-500 font-medium hover:bg-white/5 hover:border-white/20 hover:text-zinc-400 transition-all active:scale-[0.98]">
                    <i data-lucide="folder-up" class="w-5 h-5"></i>
                    Upload My Track
                </button>

                <div class="flex items-center gap-4 px-2">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-zinc-600 text-[10px] font-bold uppercase tracking-[0.2em]">or</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <div class="flex justify-center mb-10 mt-2">
                    <div
                        class="inline-flex items-center justify-center px-4 py-2.5 rounded-full bg-white/5 backdrop-blur-xl border border-white/10 shadow-[0_4px_20px_rgba(0,0,0,0.4)] gap-1.5">
                        <img src="vanso-text-colored.svg" alt="vanso" class="h-[12px] w-auto block">
                        <span class="text-zinc-400 font-bold text-[13px] leading-none tracking-[-0.5px]">AI</span>
                    </div>
                </div>

                <section class="space-y-4">
                    <h2 class="text-[22px] font-black tracking-tight text-white drop-shadow-md text-center pb-2">
                        Create Music
                    </h2>

                    <div class="space-y-7">
                        <!-- Module 1: Prompt Input (Single Box) -->
                        <div class="space-y-3">
                            <div
                                class="relative bg-white/[0.03] border border-white/10 rounded-3xl p-5 focus-within:border-vanso-cyan/50 transition-colors shadow-sm">
                                <textarea id="style-input"
                                    class="w-full bg-transparent border-none text-white resize-none outline-none min-h-[160px] text-[15px] font-normal leading-relaxed placeholder-zinc-500 pb-10"
                                    placeholder="Describe the style, mood, or instruments..."></textarea>

                                <div class="absolute bottom-4 right-4">
                                    <button type="button" id="random-template-btn"
                                        class="flex items-center justify-center p-2.5 rounded-full text-zinc-400 bg-black/20 hover:bg-white/10 hover:text-white transition-all">
                                        <i data-lucide="dices" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Unobtrusive Language Hint -->
                            <p
                                class="text-[11px] text-zinc-600 px-2 font-medium flex items-start gap-1.5 mt-1 leading-relaxed">
                                <i data-lucide="languages" class="w-3.5 h-3.5 opacity-70 flex-shrink-0 mt-0.5"></i>
                                <span>Works well in English, Portuguese, Spanish, Japanese, Korean, Chinese, German,
                                    French, Italian, Russian</span>
                            </p>
                        </div>

                        <!-- Module 2: Creative Configuration -->
                        <div class="space-y-6">
                            <!-- Row 1: 3-way Segmented Control & Help Text -->
                            <div class="space-y-2">
                                <div
                                    class="flex items-center bg-black/40 rounded-full p-1 border border-white/5 shadow-inner w-full">
                                    <button id="mode-auto"
                                        class="flex-1 py-2.5 rounded-full text-[13px] font-bold transition-all bg-white/10 text-white"
                                        onclick="setTrackMode('auto')">Auto</button>
                                    <button id="mode-custom"
                                        class="flex-1 py-2.5 rounded-full text-[13px] font-bold transition-all text-zinc-500 hover:text-zinc-300"
                                        onclick="setTrackMode('custom')">Custom</button>
                                    <button id="mode-inst"
                                        class="flex-1 py-2.5 rounded-full text-[13px] font-bold transition-all text-zinc-500 hover:text-zinc-300"
                                        onclick="setTrackMode('instrumental')">Instrumental</button>
                                </div>
                                <p id="mode-help-text"
                                    class="text-[13px] text-zinc-500 font-medium opacity-70 px-4 text-center transition-opacity">
                                    AI auto-generates lyrics, vocals, and style.
                                </p>
                            </div>

                            <!-- Vocal Controls Group -->
                            <div id="vocal-controls-group" class="space-y-6">
                                <!-- Vocal Genders (Select) -->
                                <div id="vocal-sub-options" class="flex items-center gap-5 pl-5 w-full">
                                    <span class="text-[13px] text-zinc-500 min-w-[90px] whitespace-nowrap">Vocal
                                        Gender</span>
                                    <div class="relative w-[130px]">
                                        <select id="vocal-select"
                                            class="w-full appearance-none bg-white/5 hover:bg-white/10 border border-white/10 rounded-full pl-4 pr-8 py-1.5 text-[12px] font-bold text-white outline-none focus:border-vanso-cyan/50 transition-all cursor-pointer shadow-sm">
                                            <option value="auto" class="bg-zinc-900 font-medium">Auto</option>
                                            <option value="male" class="bg-zinc-900 font-medium">Male</option>
                                            <option value="female" class="bg-zinc-900 font-medium">Female</option>
                                        </select>
                                        <i data-lucide="chevron-down"
                                            class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400 pointer-events-none"></i>
                                    </div>
                                </div>
                                <!-- Genre Picker (Select) -->
                                <div id="genres-wrapper" class="flex items-center gap-5 pl-5 w-full">
                                    <span class="text-[13px] text-zinc-500 min-w-[90px] whitespace-nowrap">Main
                                        Genre</span>
                                    <div class="relative w-[130px]">
                                        <select id="genre-select"
                                            class="w-full appearance-none bg-white/5 hover:bg-white/10 border border-white/10 rounded-full pl-4 pr-8 py-1.5 text-[13px] font-bold text-white outline-none focus:border-vanso-cyan/50 transition-all cursor-pointer shadow-sm">
                                        </select>
                                        <i data-lucide="chevron-down"
                                            class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400 pointer-events-none"></i>
                                    </div>
                                </div>

                                <!-- Lyrics Controls Card -->
                                <div id="lyrics-controls" class="space-y-4">
                                    <div class="flex items-center gap-5 pl-5 w-full">
                                        <span id="lyrics-custom-label"
                                            class="text-[13px] text-zinc-500 min-w-[90px] whitespace-nowrap">Custom
                                            Lyrics</span>
                                        <button id="lyrics-toggle-switch" type="button" onclick="toggleLyricsMode()"
                                            aria-pressed="false"
                                            class="relative inline-flex h-6 w-11 items-center rounded-full border border-white/10 bg-black/40 transition-all">
                                            <span id="lyrics-toggle-thumb"
                                                class="inline-block h-4 w-4 translate-x-1 rounded-full bg-zinc-500 transition-transform"></span>
                                        </button>
                                    </div>
                                    <div id="m-area"
                                        class="hidden animate-in fade-in zoom-in-95 duration-300 pt-1 relative">
                                        <!-- Keep the text area inside its own bounds -->
                                        <div
                                            class="relative bg-black/30 border border-white/5 rounded-2xl p-4 focus-within:border-vanso-cyan/30 transition-colors overflow-hidden">

                                            <!-- Loading Overlay -->
                                            <div id="lyrics-loading-overlay"
                                                class="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 z-10">
                                                <i data-lucide="loader-2"
                                                    class="w-6 h-6 text-vanso-magenta animate-spin"></i>
                                            </div>

                                            <textarea id="custom-lyrics-input"
                                                class="w-full bg-transparent border-none text-white placeholder-zinc-600 outline-none min-h-[140px] text-[11px] leading-relaxed relative z-0"
                                                placeholder="Paste your lyrics here...&#10;&#10;Supported structural tags:&#10;[Intro], [Verse], [Pre-Chorus], [Chorus]&#10;[Bridge], [Break], [Outro]"></textarea>
                                            <button id="enhance-btn" type="button"
                                                class="absolute bottom-3 right-3 flex items-center gap-2 px-3 py-1.5 rounded-full text-zinc-400 bg-black/40 border border-white/5 hover:bg-white/10 hover:text-white transition-all text-[13px] shadow-sm z-0">
                                                <i data-lucide="wand-2" class="w-3.5 h-3.5"></i>
                                                <span id="enhance-btn-text">Enhance</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <footer class="footer-sticky pointer-events-none flex flex-col items-center gap-3">
            <button onclick="window.location.href='ai-creator-generating.html'"
                class="pointer-events-auto w-full flex items-center justify-center gap-2 text-white font-semibold text-[16px] rounded-2xl py-3.5 shadow-[0_0_20px] shadow-vanso-magenta/30 hover:scale-[1.02] hover:shadow-[0_0_30px] hover:shadow-vanso-magenta/50 active:scale-95 transition-all duration-300 cta-gradient cursor-pointer">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                Create
            </button>
            <p class="pointer-events-auto text-[11px] text-zinc-600 font-medium text-center tracking-wide">
                Tracks will be identified as AI-generated in the community.
            </p>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        const GENRE_DATA = ['Auto', 'Pop', 'Rock', 'Rap/HipHop', 'Electronic', 'R&B', 'Latin', 'Soul', 'Folk', 'Metal', 'Blues', 'Country', 'Punk', 'Jazz', 'Classical'];
        const PROMPT_TEMPLATES = [
            'A dreamy synth-pop song with female vocals, shimmering pads, warm analog bass, catchy topline, romantic night-drive mood, 118 BPM, polished radio-ready production.',
            'An emotional piano ballad with male vocals, intimate verses, cinematic strings, heartfelt chorus, slow build, warm spacious mix, 72 BPM.',
            'A high-energy Latin pop anthem with female vocals, reggaeton groove, bright guitars, massive hook, summer festival atmosphere, 102 BPM.',
            'A dark melodic trap record with male vocals, deep 808s, crisp hi-hats, moody synth textures, memorable chorus, late-night city energy, 140 BPM.',
            'A soft lo-fi R&B track with airy vocals, mellow electric piano, dusty drums, nostalgic mood, subtle vinyl texture, intimate bedroom-pop feel, 84 BPM.'
        ];

        const MODE_BUTTON_ACTIVE_CLASS = "flex-1 py-2.5 rounded-full text-[13px] font-bold transition-all bg-white/10 text-white";
        const MODE_BUTTON_INACTIVE_CLASS = "flex-1 py-2.5 rounded-full text-[13px] font-bold transition-all text-zinc-500 hover:text-zinc-300";
        const VOCAL_OPTION_ACTIVE_CLASS = "vocal-opt text-[13px] font-bold text-white transition-colors";
        const VOCAL_OPTION_INACTIVE_CLASS = "vocal-opt text-[13px] font-bold text-zinc-500 hover:text-zinc-300 transition-colors";
        const MODE_OPTION_ACTIVE_CLASS = "mode-opt text-[13px] font-bold text-white transition-colors whitespace-nowrap";
        const MODE_OPTION_INACTIVE_CLASS = "mode-opt text-[13px] font-bold text-zinc-500 hover:text-zinc-300 transition-colors whitespace-nowrap";
        const GENRE_OPTION_ACTIVE_BASE_CLASS = "genre-opt text-[13px] font-bold transition-colors whitespace-nowrap";
        const GENRE_OPTION_INACTIVE_CLASS = "genre-opt text-[13px] font-bold text-zinc-500 hover:text-zinc-300 transition-colors whitespace-nowrap";

        const GENRE_COLORS = {
            'Auto': 'text-white',
            'Pop': 'text-[#F5328A]', // Vanso Magenta
            'Rock': 'text-[#FF5722]', // Deep Orange
            'Rap/HipHop': 'text-yellow-400',
            'Electronic': 'text-[#54E3D5]', // Vanso Cyan
            'R&B': 'text-[#E040FB]', // Vivid Purple
            'Latin': 'text-rose-500',
            'Soul': 'text-amber-400',
            'Folk': 'text-emerald-500',
            'Metal': 'text-red-600',
            'Blues': 'text-blue-500',
            'Country': 'text-[#FF9800]', // Vibrant Amber/Orange
            'Punk': 'text-lime-400',
            'Jazz': 'text-indigo-400',
            'Classical': 'text-zinc-200'
        };

        const DOM = {
            styleInput: document.getElementById('style-input'),
            randomTemplateBtn: document.getElementById('random-template-btn'),
            genresWrapper: document.getElementById('genres-wrapper'),
            genreSelect: document.getElementById('genre-select'),
            modeAutoBtn: document.getElementById('mode-auto'),
            modeCustomBtn: document.getElementById('mode-custom'),
            modeInstBtn: document.getElementById('mode-inst'),
            modeHelpText: document.getElementById('mode-help-text'),
            vocalSubOptions: document.getElementById('vocal-sub-options'),
            vocalSelect: document.getElementById('vocal-select'),
            vocalControlsGroup: document.getElementById('vocal-controls-group'),
            lyricsControls: document.getElementById('lyrics-controls'),
            lyricsCustomLabel: document.getElementById('lyrics-custom-label'),
            lyricsToggleSwitch: document.getElementById('lyrics-toggle-switch'),
            lyricsToggleThumb: document.getElementById('lyrics-toggle-thumb'),
            manualArea: document.getElementById('m-area'),
            lyricsTextarea: document.querySelector('#m-area textarea'),
            enhanceBtn: document.getElementById('enhance-btn'),
            enhanceBtnText: document.getElementById('enhance-btn-text'),
            lyricsOverlay: document.getElementById('lyrics-loading-overlay')
        };

        const state = {
            selectedGenre: 'Auto',
            trackMode: 'auto',
            vocalType: 'auto',
            lyricsMode: 'auto',
            currentTemplate: ''
        };

        const DEFAULT_PLACEHOLDER = "Describe the style, mood, or instruments...";

        function setPromptTemplate(template) {
            state.currentTemplate = template;
            if (document.activeElement !== DOM.styleInput) {
                DOM.styleInput.setAttribute('placeholder', state.currentTemplate);
            }
        }

        function randomizePromptTemplate() {
            let nextTemplate = PROMPT_TEMPLATES[Math.floor(Math.random() * PROMPT_TEMPLATES.length)];
            if (PROMPT_TEMPLATES.length > 1) {
                while (nextTemplate === state.currentTemplate) {
                    nextTemplate = PROMPT_TEMPLATES[Math.floor(Math.random() * PROMPT_TEMPLATES.length)];
                }
            }
            setPromptTemplate(nextTemplate);
        }

        function appendToInput(text) {
            const current = DOM.styleInput.value.trim();
            const tags = current ? current.split(',').map(t => t.trim()) : [];

            if (tags.includes(text)) {
                // Toggle off: remove tag
                const filtered = tags.filter(t => t !== text);
                DOM.styleInput.value = filtered.join(', ');
                return false; // Removed
            } else {
                // Toggle on: add tag
                tags.push(text);
                DOM.styleInput.value = tags.join(', ');
                DOM.styleInput.focus();
                return true; // Added
            }
        }



        function initGenres() {
            const fragment = document.createDocumentFragment();
            DOM.genreSelect.innerHTML = '';

            GENRE_DATA.forEach((genre) => {
                const opt = document.createElement('option');
                opt.value = genre;
                opt.textContent = genre;
                opt.className = 'bg-zinc-900 font-medium text-white';
                fragment.appendChild(opt);
            });

            DOM.genreSelect.appendChild(fragment);

            // Core event bindings
            DOM.genreSelect.addEventListener('change', (e) => {
                state.selectedGenre = e.target.value;
            });
            DOM.vocalSelect.addEventListener('change', (e) => {
                state.vocalType = e.target.value;
            });
        }

        function setTrackMode(mode) {
            state.trackMode = mode;

            // Switch segmented control styles
            DOM.modeAutoBtn.className = (mode === 'auto') ? MODE_BUTTON_ACTIVE_CLASS : MODE_BUTTON_INACTIVE_CLASS;
            DOM.modeCustomBtn.className = (mode === 'custom') ? MODE_BUTTON_ACTIVE_CLASS : MODE_BUTTON_INACTIVE_CLASS;
            DOM.modeInstBtn.className = (mode === 'instrumental') ? MODE_BUTTON_ACTIVE_CLASS : MODE_BUTTON_INACTIVE_CLASS;

            // Handle help text visibility and content
            if (mode === 'custom') {
                DOM.modeHelpText.classList.add('hidden');
            } else {
                DOM.modeHelpText.classList.remove('hidden');
                if (mode === 'auto') {
                    DOM.modeHelpText.innerHTML = "AI auto-generates lyrics, vocals, and style.";
                } else if (mode === 'instrumental') {
                    DOM.modeHelpText.innerHTML = "AI auto-generates pure music only.<br>No vocals or lyrics.";
                }
            }

            // Handle visibility for Options Group
            if (mode === 'custom') {
                DOM.vocalControlsGroup.style.display = 'block';
                DOM.vocalSubOptions.style.display = 'flex';
                DOM.genresWrapper.style.display = 'flex';
                DOM.lyricsControls.style.display = 'block';
            } else {
                // Both Auto and Instrumental hide the manual options block completely
                DOM.vocalControlsGroup.style.display = 'none';
                DOM.vocalSubOptions.style.display = 'none';
                DOM.genresWrapper.style.display = 'none';
                DOM.lyricsControls.style.display = 'none';
                setLyricsMode(false); // Make sure lyric mode switch falls back gracefully
            }
        }

        // Vocal Select handler handles state, no dedicated button setter required anymore

        function setLyricsMode(isCustom) {
            state.lyricsMode = isCustom ? 'custom' : 'auto';
            DOM.lyricsToggleSwitch.setAttribute('aria-pressed', String(isCustom));
            DOM.lyricsCustomLabel.classList.toggle('text-white', isCustom);
            DOM.lyricsCustomLabel.classList.toggle('text-zinc-500', !isCustom);
            DOM.lyricsToggleSwitch.classList.toggle('bg-white/20', isCustom);
            DOM.lyricsToggleSwitch.classList.toggle('border-white/40', isCustom);
            DOM.lyricsToggleSwitch.classList.toggle('bg-black/40', !isCustom);
            DOM.lyricsToggleSwitch.classList.toggle('border-white/10', !isCustom);
            DOM.lyricsToggleThumb.classList.toggle('translate-x-6', isCustom);
            DOM.lyricsToggleThumb.classList.toggle('translate-x-1', !isCustom);
            DOM.lyricsToggleThumb.classList.toggle('bg-white', isCustom);
            DOM.lyricsToggleThumb.classList.toggle('bg-zinc-500', !isCustom);
            DOM.manualArea.style.display = isCustom ? 'block' : 'none';
        }

        function toggleLyricsMode() {
            if (state.trackMode !== 'custom') return;
            setLyricsMode(state.lyricsMode !== 'custom');
        }

        function initializePage() {
            setPromptTemplate(PROMPT_TEMPLATES[0]);
            initGenres();
            setTrackMode('auto');
        }

        DOM.randomTemplateBtn.addEventListener('click', randomizePromptTemplate);

        DOM.styleInput.addEventListener('focus', () => {
            DOM.styleInput.setAttribute('placeholder', DEFAULT_PLACEHOLDER);
        });

        DOM.styleInput.addEventListener('blur', () => {
            DOM.styleInput.setAttribute('placeholder', state.currentTemplate);
        });

        // Enhance lyrics fake loading state
        DOM.enhanceBtn.addEventListener('click', () => {
            DOM.lyricsOverlay.classList.remove('opacity-0', 'pointer-events-none');
            DOM.lyricsOverlay.classList.add('opacity-100');
            DOM.enhanceBtnText.textContent = "Enhancing...";

            setTimeout(() => {
                DOM.lyricsOverlay.classList.remove('opacity-100');
                DOM.lyricsOverlay.classList.add('opacity-0', 'pointer-events-none');
                DOM.enhanceBtnText.textContent = "Enhance";
            }, 2000);
        });

        initializePage();
    </script>
</body>

</html>
